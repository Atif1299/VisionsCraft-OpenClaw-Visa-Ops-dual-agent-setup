  <text x="460" y="122" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="5" fill="#94a3b8">OPENCLAW ? VISA ? OPS ? LEADS ? BOOKING</text>
  <text x="460" y="158" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#64748b">WhatsApp gateway ? GPT-5.5 ? Node 22 ? Google Calendar ? parallel-free search</text>
